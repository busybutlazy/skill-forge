services:
  forge-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skill-forge-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true
    command: bash

  forge:
    build:
      context: .
      dockerfile: Dockerfile
    image: skill-forge
    working_dir: /workspace/project
    volumes:
      - ${SKILL_FORGE_PROJECT_HOST_DIR:-.}:/workspace/project
    environment:
      SKILL_FORGE_PROJECT_DIR: /workspace/project
      SKILL_FORGE_PROJECT_HOST_DIR: ${SKILL_FORGE_PROJECT_HOST_DIR:-.}
    stdin_open: true
    tty: true
    user: "${HOST_UID:-0}:${HOST_GID:-0}"
