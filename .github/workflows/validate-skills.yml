name: Validate skill hashes

on:
  push:
    paths:
      - "canonical-skills/**"
  pull_request:
    paths:
      - "canonical-skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e . -q

      - run: python -m pytest tests/test_skill_forge.py::ValidationTests::test_all_canonical_skills_validate -v
